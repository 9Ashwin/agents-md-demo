name: Update AGENTS.md
on:
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  update:
    uses: 9Ashwin/agents-md-updater/.github/workflows/update-agents-md.yml@main
    with:
      agent: claude
      target_files: AGENTS.md
      output_mode: pr
      pr_title: "chore: auto-update AGENTS.md"
      anthropic_base_url: https://api.deepseek.com/anthropic
      model: deepseek-v4-pro
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
