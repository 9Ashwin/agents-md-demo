name: Update AGENTS.md
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  update:
    uses: 9Ashwin/agents-md-updater/.github/workflows/update-agents-md.yml@main
    with:
      agent: claude
      target_files: AGENTS.md
      output_mode: pr
      pr_title: "chore: auto-update AGENTS.md"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
